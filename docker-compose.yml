version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: openbudget_postgres
    restart: always
    environment:
      POSTGRES_USER: openbudget_user
      POSTGRES_PASSWORD: openbudget_password
      POSTGRES_DB: openbudget_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: openbudget_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: openbudget_backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_URL=postgresql://openbudget_user:openbudget_password@postgres:5432/openbudget_db
      - REDIS_URL=redis://redis:6379
      - BOT_TOKEN=${BOT_TOKEN}
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
